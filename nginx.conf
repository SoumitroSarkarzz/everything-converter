# Nginx configuration for Everything Converter
# Use this if deploying with Nginx instead of Apache

server {
    listen 80;
    server_name _;
    
    root /var/www/everything-converter;
    index index.html;
    
    # Gzip compression
    gzip on;
    gzip_types text/html text/plain text/xml text/css text/javascript application/javascript application/json;
    gzip_min_length 1000;
    gzip_vary on;
    
    # Cache control headers
    location ~* \.(css|js|json|svg|png|jpg|jpeg|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    location ~* \.(html|xml)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # Font caching
    location ~* \.(ttf|otf|woff|woff2|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }
    
    # SPA routing - fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # HTTPS redirect (uncomment if using SSL)
    # if ($scheme != "https") {
    #     return 301 https://$server_name$request_uri;
    # }
    
    # SSL configuration (uncomment if using HTTPS)
    # listen 443 ssl;
    # ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
}
